<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي الرقمية | ابحث عن كتابك</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --white: #ffffff;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --desc-color: #777;
            --img-bg: #eee;
            --shadow-color: rgba(0,0,0,0.1);
            --card-shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --primary-color: #5ba3f5;
            --secondary-color: #1a1a2e;
            --bg-color: #0f0f1e;
            --white: #1e1e2e;
            --text-color: #e4e4e7;
            --card-bg: #1e1e2e;
            --desc-color: #a1a1aa;
            --img-bg: #2a2a3e;
            --shadow-color: rgba(0,0,0,0.5);
            --card-shadow: rgba(0,0,0,0.3);
        }

        * {
            transition: background-color 0.3s ease, color 0.3s ease;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        .hero-section {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: #ffffff;
            padding: 60px 20px 90px;
            text-align: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            position: relative;
            z-index: 1;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            padding: 0;
            z-index: 10;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(20deg) scale(1.1);
        }

        .search-container {
            max-width: 600px;
            margin: -30px auto 40px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 50px;
            display: flex;
            box-shadow: 0 10px 25px var(--shadow-color);
            position: relative;
            z-index: 5;
        }

        input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            outline: none;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            background: var(--card-bg);
            color: var(--text-color);
        }

        input::placeholder {
            color: var(--desc-color);
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #357abd;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .book-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px var(--card-shadow);
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-10px);
        }

        .book-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: var(--img-bg);
            padding: 10px;
        }

        .book-info {
            padding: 20px;
            flex-grow: 1;
        }

        .book-info h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: var(--primary-color);
        }

        .book-info p {
            font-size: 14px;
            color: var(--desc-color);
            line-height: 1.6;
            margin: 5px 0;
        }

        .book-info p strong {
            color: var(--text-color);
        }

        .loader {
            display: none;
            border: 4px solid var(--img-bg);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
                border-radius: 20px;
                margin: -30px 15px 40px;
            }

            button {
                padding: 15px;
                margin-top: 10px;
            }

            .hero-section h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <section class="hero-section">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="تبديل الوضع">
            🌙
        </button>

        <h1>مستكشف الكتب الذكي 📖</h1>
        <p>ابحث عن تفاصيل أي كتاب في ثوانٍ معدودة</p>
    </section>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="أدخل اسم الكتاب أو المؤلف...">
        <button onclick="fetchBooks()">بحث</button>
    </div>

    <div id="loader" class="loader"></div>

    <div id="results" class="results-grid"></div>

    <footer style="text-align:center;padding:20px;color:var(--desc-color);">
        تم التطوير بواسطة عباس أمير © 2026
    </footer>

    <script>

        // حفظ واسترجاع الوضع الليلي
        function toggleTheme() {

            const html = document.documentElement;
            const toggleBtn = document.getElementById('themeToggle');
            const currentTheme = html.getAttribute('data-theme');

            if (currentTheme === 'dark') {

                html.removeAttribute('data-theme');
                toggleBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');

            } else {

                html.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        // استرجاع الثيم المحفوظ
        window.onload = () => {

            const savedTheme = localStorage.getItem('theme');

            if (savedTheme === 'dark') {

                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        };

        // البحث عند الضغط Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {

            if (e.key === 'Enter') {
                fetchBooks();
            }
        });

        async function fetchBooks() {

            const query = document.getElementById('searchInput').value;

            const resultsDiv = document.getElementById('results');

            const loader = document.getElementById('loader');

            if (!query) {

                alert("من فضلك اكتب اسماً للبحث عنه");
                return;
            }

            resultsDiv.innerHTML = "";

            loader.style.display = "block";

            try {

                const response = await fetch(
                    `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=12`
                );

                const data = await response.json();

                loader.style.display = "none";

                if (!data.items) {

                    resultsDiv.innerHTML =
                        "<p style='grid-column:1/-1;text-align:center;'>لم يتم العثور على نتائج.</p>";

                    return;
                }

                data.items.forEach(item => {

                    const info = item.volumeInfo;

                    const thumb = info.imageLinks
                        ? info.imageLinks.thumbnail
                        : 'https://via.placeholder.com/150x200?text=No+Image';

                    const desc = info.description
                        ? info.description.substring(0, 120) + "..."
                        : "لا يوجد وصف متاح لهذا الكتاب حالياً.";

                    const card = `
                        <div class="book-card">

                            <img
                                src="${thumb}"
                                alt="${info.title}"
                                class="book-img"
                                onerror="this.src='https://via.placeholder.com/150x200?text=No+Image'"
                            />

                            <div class="book-info">

                                <h3>${info.title}</h3>

                                <p>
                                    <strong>المؤلف:</strong>
                                    ${info.authors ? info.authors.join(', ') : 'غير معروف'}
                                </p>

                                <p>${desc}</p>

                            </div>

                        </div>
                    `;

                    resultsDiv.innerHTML += card;
                });

            } catch (error) {

                loader.style.display = "none";

                alert("حدث خطأ في الاتصال بالخادم. تأكد من الإنترنت.");
            }
        }

    </script>

</body>
</html>
